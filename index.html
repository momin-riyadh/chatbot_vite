<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>gPlex Webchat</title>
    <link rel="stylesheet" href="/src/css/style.css"/>
</head>
<body>

<div id="chat-widget" class="flex flex-col rounded-2xl shadow-2xl overflow-hidden"
     style="width:380px; height:640px; border: 1px solid #ffcfb6;">

    <!-- ── HEADER (shared) ─────────────────────────────────── -->
    <header class="flex items-center gap-3 px-4 py-3 bg-white border-b border-gray-100 shrink-0 z-10">
        <div class="flex items-center rounded-full justify-center w-12 h-12  shrink-0 border border-gray-200"
             style="background:#ffffff;">
            <img src="/src/assets/images/logo.png" alt="">
        </div>
        <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-800 leading-tight" style="font-family:'Sora',sans-serif;">Apex</p>
            <p class="text-xs text-green-600 font-medium flex items-center gap-1">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-green-500"></span>
                Online
            </p>
        </div>
        <button id="minimize-btn"
                class="w-7 h-7 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <button id="close-btn"
                class="w-7 h-7 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </header>

    <!-- ══ SCREEN: LOGIN ════════════════════════════════════════ -->
    <div id="screen-login" class="flex-1 flex flex-col bg-white px-6 pt-8 pb-4 screen-panel">
        <h2 class="text-base text-center font-bold text-gray-800 mb-6 leading-snug">
            Welcome to gPlex Webchat Online Service!
        </h2>
        <label class="text-sm text-gray-700 font-medium mb-1">Name</label>
        <input id="login-name" type="text" placeholder="Name" class="login-input mb-5"/>
        <label class="text-sm text-gray-700 font-medium mb-1">Phone Number</label>
        <input id="login-phone" type="tel" placeholder="01XXXXXXXXX" class="login-input mb-6"/>
        <p id="login-error" class="text-xs text-red-500 -mt-4 mb-4 hidden"></p>
        <div class="flex justify-center">
            <button id="start-chat-btn"
                    class="start-btn px-10 py-2.5 rounded text-white text-sm font-bold tracking-wide"
                    style="background:#c0392b;">Start Chat
            </button>
        </div>
        <div class="flex-1"></div>
    </div>

    <!-- ══ SCREEN: CHAT ═════════════════════════════════════════ -->
    <div id="screen-chat" class="hidden flex-1 flex flex-col screen-panel overflow-hidden ">
        <div id="chat-body" class="flex-1 overflow-y-auto px-4 py-5 dot-bg flex flex-col gap-4"></div>
        <div class="bg-white border-t border-gray-100 px-3 py-3 flex items-center gap-2 shrink-0">
            <button class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-orange-500 transition-colors shrink-0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <input id="msg-input" type="text" placeholder="Type a message..."
                   class="flex-1 p-1 border-rounded-2 bg-amber-50  text-sm text-gray-700 placeholder-gray-400 border-2 border-amber-100 py-3.5 focus:outline-none"/>
            <button id="send-btn" class="w-9 h-9 flex items-center justify-center rounded-full text-white shrink-0"
                    style="background: var(--brand);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="white" stroke-width="2.2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- ══ SCREEN: FEEDBACK ════════════════════════════════════ -->
    <div id="screen-feedback" class="hidden flex-1 flex flex-col bg-white px-6 pt-8 pb-4 screen-panel">

        <h2 class="text-base font-bold text-gray-800 mb-2 text-center leading-snug">
            How was your chat experience?
        </h2>

        <!-- Rating legend -->
        <p class="text-xs text-gray-400 text-center mb-5">
            Poor (1-3) &nbsp;&nbsp; Satisfactory (4) &nbsp;&nbsp; Excellent (5)
        </p>

        <!-- Star rating -->
        <div id="star-row" class="flex justify-center gap-3 mb-6">
            <button class="star-btn" data-val="1" aria-label="1 star">★</button>
            <button class="star-btn" data-val="2" aria-label="2 stars">★</button>
            <button class="star-btn" data-val="3" aria-label="3 stars">★</button>
            <button class="star-btn" data-val="4" aria-label="4 stars">★</button>
            <button class="star-btn" data-val="5" aria-label="5 stars">★</button>
        </div>

        <!-- Text area -->
        <textarea id="feedback-text" rows="5" placeholder="Share your feedback (optional)"
                  class="feedback-textarea mb-5"></textarea>

        <!-- Buttons -->
        <button id="submit-feedback-btn" class="red-full-btn mb-3">Submit Feedback</button>
        <button id="continue-chat-btn" class="red-full-btn">Continue Chat</button>

        <div class="flex-1"></div>
    </div>

    <!-- ══ SCREEN: THANK YOU ════════════════════════════════════ -->
    <div id="screen-thankyou"
         class="hidden flex-1 flex flex-col items-center justify-center bg-white px-6 screen-panel">
        <div class="w-16 h-16 rounded-full flex items-center justify-center mb-5"
             style="background:#f0fdf4;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                <path d="M20 6L9 17l-5-5" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"
                      stroke-linejoin="round"/>
            </svg>
        </div>
        <h2 class="text-lg font-bold text-gray-800 mb-2 text-center" style="font-family:'Sora',sans-serif;">
            Thank You!
        </h2>
        <p class="text-sm text-gray-500 text-center leading-relaxed mb-8">
            Your feedback has been submitted.<br>We appreciate you chatting with us!
        </p>
    </div>

    <!-- ── FOOTER (shared) ─────────────────────────────────── -->
    <div class="bg-white text-center py-2 text-xs text-gray-400 flex items-center justify-center gap-1 border-t border-gray-100 shrink-0">
        Powered by <span class="font-semibold text-gray-600"
                         style="font-family:'Sora',sans-serif;">&nbsp;gPlex</span>
    </div>

</div><!-- /chat-widget -->

<script type="module" src="/src/js/main.js"></script>
</body>
</html>
