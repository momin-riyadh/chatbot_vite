<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>gPlex Webchat</title>
    <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     SHARED WIDGET SHELL  (login + chat share the same frame)
═══════════════════════════════════════════════════════════════ -->
<div id="chat-widget" class="flex flex-col rounded-2xl shadow-2xl overflow-hidden"
     style="width:380px; height:640px; border: 2px solid #16a34a;">

    <!-- ── HEADER (shared) ───────────────────────────────────── -->
    <header class="flex items-center gap-3 px-4 py-3 bg-white border-b border-gray-100 shrink-0"
            style="border-top: 3px solid #16a34a;">
        <div class="flex items-center justify-center w-9 h-9 rounded-lg shrink-0"
             style="background:#16a34a;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
        </div>
        <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-800 leading-tight" style="font-family:'Sora',sans-serif;">gPlex
                Webchat</p>
            <p class="text-xs text-green-600 font-medium flex items-center gap-1">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-green-500"></span>
                Online
            </p>
        </div>
        <button id="close-btn"
                class="w-7 h-7 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </header>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN: LOGIN
    ═══════════════════════════════════════════════════════════ -->
    <div id="screen-login" class="flex-1 flex flex-col bg-white px-6 pt-8 pb-4 screen-panel">

        <h2 class="text-base font-bold text-gray-800 mb-6 leading-snug">
            Welcome to gPlex Webchat Online Service!
        </h2>

        <!-- Name -->
        <label class="text-sm text-gray-700 font-medium mb-1">Name</label>
        <input id="login-name" type="text" placeholder="Name"
               class="login-input mb-5"/>

        <!-- Phone -->
        <label class="text-sm text-gray-700 font-medium mb-1">Phone Number</label>
        <input id="login-phone" type="tel" placeholder="01XXXXXXXXX"
               class="login-input mb-6"/>

        <!-- Error message -->
        <p id="login-error" class="text-xs text-red-500 -mt-4 mb-4 hidden"></p>

        <!-- CTA -->
        <div class="flex justify-center">
            <button id="start-chat-btn"
                    class="start-btn px-10 py-2.5 rounded text-white text-sm font-bold tracking-wide"
                    style="background:#c0392b;">
                Start Chat
            </button>
        </div>

        <!-- spacer -->
        <div class="flex-1"></div>

        <!-- Footer -->
        <div class="text-center text-xs text-gray-400 flex items-center justify-center gap-1 pt-4 border-t border-gray-100">
            Powered by <span class="font-semibold text-gray-600"
                             style="font-family:'Sora',sans-serif;">&nbsp;gPlex</span>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCREEN: CHAT
    ═══════════════════════════════════════════════════════════ -->
    <div id="screen-chat" class="hidden flex-1 flex flex-col screen-panel">

        <!-- Chat body -->
        <div id="chat-body" class="flex-1 overflow-y-auto px-4 py-5 dot-bg flex flex-col gap-4"></div>

        <!-- Input bar -->
        <div class="bg-white border-t border-gray-100 px-3 py-3 flex items-center gap-2 shrink-0">
            <button class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-orange-500 transition-colors shrink-0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <input id="msg-input" type="text" placeholder="Type a message..."
                   class="flex-1 text-sm text-gray-700 placeholder-gray-400 bg-transparent border-none py-1.5"/>
            <button id="send-btn"
                    class="w-9 h-9 flex items-center justify-center rounded-full text-white shrink-0"
                    style="background: var(--brand);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"
                          stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Footer -->
        <div class="bg-white text-center py-1.5 text-xs text-gray-400 flex items-center justify-center gap-1 border-t border-gray-100 shrink-0">
            Powered by <span class="font-semibold text-gray-600"
                             style="font-family:'Sora',sans-serif;">&nbsp;gPlex</span>
        </div>
    </div>

</div><!-- /chat-widget -->

<script type="module" src="/main.js"></script>
</body>
</html>
