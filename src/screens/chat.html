<div id="screen-chat" class="hidden flex-1 min-h-0 flex flex-col screen-panel overflow-hidden ">
    <div id="chat-body" class="flex-1 min-h-0 overflow-y-auto px-4 py-5 dot-bg flex flex-col gap-4"></div>
    <div class="bg-white border-t border-gray-100 px-3 py-3 flex items-center gap-2 shrink-0">
        <button id="attachment-btn" type="button" class="w-8 h-8 flex items-center justify-center border border-gray-100 rounded-full text-gray-400 hover:bg-gray-100 hover:text-orange-500 transition-colors shrink-0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <input id="attachment-input" type="file" class="hidden" />
        <div id="attachment-preview" class="hidden max-w-[220px] items-center gap-2 px-2 py-1.5 rounded-xl border border-amber-200 bg-amber-50 text-xs text-amber-900 shrink-0">
            <img id="attachment-thumb" class="hidden w-9 h-9 rounded object-cover border border-amber-200 shrink-0" alt="Attachment preview" />
            <span id="attachment-name" class="truncate"></span>
            <button id="attachment-remove-btn" type="button" class="text-amber-700 hover:text-amber-900 leading-none" aria-label="Remove attachment">x</button>
        </div>
        <input id="msg-input" type="text" placeholder="Type a message..."
               class="flex-1 p-1 border-rounded-2 bg-amber-50  text-sm text-gray-700 placeholder-gray-400 border-2 border-amber-100 py-3.5 focus:outline-none"/>
        <button id="send-btn" class="w-9 h-9 flex items-center justify-center rounded-full text-white shrink-0"
                style="background: var(--brand);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="white" stroke-width="2.2"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>
</div>
