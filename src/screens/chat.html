<div id="screen-chat" class="hidden flex-1 min-h-0 flex flex-col screen-panel overflow-hidden ">
    <div id="chat-body" class="flex-1 min-h-0 overflow-y-auto px-4 py-5 dot-bg flex flex-col gap-4"></div>
    <!-- Input area container: vertical layout for attachment preview + textarea row -->
    <div class="bg-white border-t border-gray-100 shrink-0 flex flex-col">
        <!-- Preview panel: positioned above the input controls; #attachment-thumbs is a vertical-scroll grid (see Tailwind classes). Layout tweaks here should stay in sync with the thumbnail size in main.js (showAttachmentPreview). -->
        <div id="attachment-preview"
             class="hidden px-3 pt-3 pb-2">
            <div class="w-full px-2 py-2 rounded-xl border border-gray-200 bg-gray-100">
                <div id="attachment-thumbs"
                     class="grid grid-cols-5 gap-1 w-full max-h-65 overflow-y-auto overflow-x-hidden pr-1"></div>
            </div>
        </div>
        <!-- Input controls row -->
        <div class="px-3 py-3 flex items-center gap-2">
            <!-- Attachments: images only, multi-select. JS (main.js) reads files, builds data-URL previews, and on send passes File metadata to the API layer (not the raw bytes in the current Anthropic JSON body). -->
            <button id="attachment-btn" type="button"
                    class="w-8 h-8 flex items-center justify-center border border-gray-100 rounded-full text-gray-400 hover:bg-gray-100 hover:text-orange-500 transition-colors shrink-0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <input id="attachment-input" type="file" accept="image/*" multiple class="hidden"/>
            <textarea id="msg-input" rows="1" placeholder="Type a message..."
                      class="flex-1 p-1 border-rounded-2 bg-gray-50 rounded-md text-sm text-gray-700 placeholder-gray-400 border-2 border-gray-100 py-3.5 focus:outline-none resize-none overflow-hidden leading-5"></textarea>
            <button id="send-btn" type="button" class="w-9 h-9 flex items-center justify-center rounded-full text-white shrink-0"
                    style="background: var(--brand);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="white" stroke-width="2.2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
</div>
